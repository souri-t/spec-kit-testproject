openapi: 3.0.0
info:
  title: Prompt Scheduler API
  version: 1.0.0
paths:
  /config:
    get:
      summary: 設定情報取得
      responses:
        '200':
          description: 設定情報
    post:
      summary: 設定情報登録・更新
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Config'
      responses:
        '200':
          description: 登録成功
  /result:
    get:
      summary: 最新AI結果取得
      responses:
        '200':
          description: AI結果
  /run:
    post:
      summary: 手動実行（AI問い合わせ）
      responses:
        '200':
          description: 実行結果
components:
  schemas:
    Config:
      type: object
      properties:
        prompt:
          type: string
        time:
          type: string
        ai:
          type: object
          properties:
            api_key:
              type: string
            model:
              type: string
    AIResult:
      type: object
      properties:
        executed_at:
          type: string
        prompt:
          type: string
        response:
          type: object
